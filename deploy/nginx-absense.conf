# Example HTTPS site for absense.knust.edu.gh
# Install: sudo cp deploy/nginx-absense.conf /etc/nginx/sites-available/absense
#          sudo ln -sf /etc/nginx/sites-available/absense /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name absense.knust.edu.gh;

    # ssl_certificate /etc/letsencrypt/live/absense.knust.edu.gh/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/absense.knust.edu.gh/privkey.pem;

    client_max_body_size 10M;

    # API — required for admin/lecturer login (502 if missing)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        alias /var/lib/absense/uploads/;
        expires 7d;
        add_header Cache-Control "private";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
