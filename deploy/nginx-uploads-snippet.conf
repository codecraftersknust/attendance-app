# Add inside your HTTPS server block for absense.knust.edu.gh
# Full example (includes /api/ proxy — fixes login 502): deploy/nginx-absense.conf
# Serves selfies and reference faces from disk (faster than FastAPI).

location /uploads/ {
    alias /var/lib/absense/uploads/;
    expires 7d;
    add_header Cache-Control "private";
}

# Ensure large selfie uploads reach the API
client_max_body_size 10M;
